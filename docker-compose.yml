version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000

  backend-nodejs:
    build: ./backend/nodejs
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  backend-python:
    build: ./backend/python
    ports:
      - "8000:8000"
