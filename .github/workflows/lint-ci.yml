name: Lint Check Quality

on:
  pull_request:
    paths:
      - "backend/nodejs/**"
      - "backend/python/**"
      - "frontend/**"

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "^18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: ./node_modules/.bin/eslint src/

  lint-node-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/nodejs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/nodejs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: ./node_modules/.bin/eslint src/

  lint-python-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: flake8 .
